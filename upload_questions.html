<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upload Questions</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
* { box-sizing:border-box; font-family:"Segoe UI", Arial, sans-serif; }

body {
    min-height:100vh;
    background-color:#fbfbf8;
    padding:40px;
}

.panel {
    max-width:900px;
    margin:auto;
    background:white;
    border-radius:22px;
    padding:40px;
}

.main-btn {
    background:#102f52;
    color:white;
    border-radius:25px;
    padding:12px;
    border:none;
    font-weight:600;
}

.main-btn:hover { background:#2f5c8c; }

.form-control { border-radius:20px; padding:10px 16px; }

.cancel-btn { background:#d9534f; color:white; border:none; padding:5px 12px; border-radius:20px; }
.cancel-btn:hover { background:#c9302c; }
</style>
</head>

<body>
<div class="panel shadow-lg">
<h3 class="text-center mb-4" style="color:#3373bc;">Add Question Paper</h3>

<form method="POST" id="questionForm">
<div id="questions"></div>

<button type="button" class="btn btn-outline-secondary mt-3" onclick="addQuestion()">Add Question</button>
<br><br>
<button type="submit" class="main-btn w-100">Save Question Paper</button>
</form>
</div>

<script>
let qIndex = 0;

function addQuestion(q="", marks="", model="") {
    const questionsDiv = document.getElementById("questions");
    const div = document.createElement("div");
    div.classList.add("mb-4", "p-3", "border", "rounded");
    div.id = "q_"+qIndex;

    div.innerHTML = `
        <input class="form-control mb-2" name="question" placeholder="Question" value="${q}" required>
        <input class="form-control mb-2" name="max_marks" placeholder="Marks" value="${marks}" required>
        <textarea class="form-control mb-2" name="model_answer" placeholder="Model Answer" rows="3" required>${model}</textarea>
        <button type="button" class="cancel-btn" onclick="removeQuestion(${qIndex})">Cancel Question</button>
    `;
    questionsDiv.appendChild(div);
    qIndex++;
}

function removeQuestion(index){
    const div = document.getElementById("q_"+index);
    if(div) div.remove();
}

// Add first question by default
addQuestion();
</script>
</body>
</html>
