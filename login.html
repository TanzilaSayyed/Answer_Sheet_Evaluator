<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Handwritten font -->
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body {
    min-height: 100vh;
    background-color: #fbfbf8;
    background-image:
        repeating-linear-gradient(
            to bottom,
            rgba(0,0,0,0.05) 0px,
            rgba(0,0,0,0.05) 1px,
            transparent 1px,
            transparent 24px
        ),
        radial-gradient(circle at 15% 20%, rgba(160,180,210,0.18) 0%, transparent 45%),
        radial-gradient(circle at 80% 30%, rgba(160,180,210,0.15) 0%, transparent 45%),
        radial-gradient(circle at 30% 75%, rgba(160,180,210,0.18) 0%, transparent 45%),
        radial-gradient(circle at 75% 80%, rgba(160,180,210,0.15) 0%, transparent 45%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
}

.doodle {
    position: absolute;
    font-family: 'Patrick Hand', cursive;
    color: rgba(59, 110, 168, 0.22);
    font-size: 42px;
    pointer-events: none;
}

.d1 { top: 8%; left: 12%; transform: rotate(-8deg); }
.d2 { top: 25%; right: 18%; font-size: 36px; transform: rotate(12deg); }
.d3 { top: 55%; left: 20%; font-size: 48px; transform: rotate(-5deg); }
.d4 { bottom: 18%; right: 22%; font-size: 40px; transform: rotate(10deg); }
.d5 { bottom: 35%; left: 55%; font-size: 34px; transform: rotate(-12deg); }

.login-panel {
    width: 100%;
    max-width: 420px;
    background-color: rgba(255, 255, 255, 0.96);
    border-radius: 22px;
    padding: 40px 35px;
    color: #1F2937;
    z-index: 2;
}

.login-panel h2 {
    color: #3373bc;
    font-weight: 600;
    margin-bottom: 30px;
    text-align: center;
}

.form-control {
    background-color: #ffffff;
    border: 1px solid #cfd9e3;
    border-radius: 25px;
    padding: 12px 18px;
    font-size: 15px;
}

.form-control:focus {
    border-color: #3b6ea8;
    box-shadow: none;
}

.login-btn {
    background-color: #102f52;
    color: #ffffff;
    border-radius: 25px;
    padding: 12px;
    font-weight: 600;
    border: none;
}

.login-btn:hover {
    background-color: #2f5c8c;
}

.footer-text {
    margin-top: 25px;
    text-align: center;
    font-size: 13px;
    color: #6b7280;
}
</style>
</head>

<body>

<div class="doodle d1">A B C</div>
<div class="doodle d2">notes</div>
<div class="doodle d3">idea</div>
<div class="doodle d4">learn</div>
<div class="doodle d5">think</div>

<div class="login-panel shadow-lg">
    <h2>Teacher Login</h2>

    <form method="POST">
        <div class="mb-3">
            <input type="text"
                   class="form-control"
                   name="username"
                   placeholder="Username"
                   required>
        </div>

        <div class="mb-4">
            <input type="password"
                   class="form-control"
                   name="password"
                   placeholder="Password"
                   required>
        </div>

        <button type="submit" class="login-btn w-100">
            LOG IN
        </button>
    </form>

    <div class="footer-text">
        Education Platform • Teacher Access
    </div>
</div>

</body>
</html>
