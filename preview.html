<!DOCTYPE html>
<html>
<head>
<title>OCR Preview</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-5">

<h3 class="mb-4">OCR Preview Before Evaluation</h3>

<table class="table table-bordered">

<tr>
<th>Roll</th>
<th>Question</th>
<th>Answer Sheet</th>
<th>OCR Extracted Text</th>
</tr>

{% for r in rows %}

<tr>

<td>{{ r.student }}</td>

<td>{{ r.question }}</td>

<td>
<img src="data:image/png;base64,{{ r.image }}" width="200">
</td>

<td>{{ r.ocr }}</td>

</tr>

{% endfor %}

</table>

<a href="/confirm" class="btn btn-success">Confirm Evaluation</a>

</body>
</html>
