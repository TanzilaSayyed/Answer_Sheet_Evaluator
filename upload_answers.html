<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upload Answers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
* { box-sizing:border-box; font-family:"Segoe UI", Arial, sans-serif; }

body { min-height:100vh; background-color:#fbfbf8; padding:40px; }

.panel { max-width:900px; margin:auto; background:white; border-radius:22px; padding:40px; }

.main-btn { background:#102f52; color:white; border-radius:25px; padding:12px; border:none; font-weight:600; }
.main-btn:hover { background:#2f5c8c; }

.form-control { border-radius:20px; padding:10px 16px; }

</style>
</head>

<body>
<div class="panel shadow-lg">
<h3 class="text-center mb-4" style="color:#3373bc;">Upload Student Answers</h3>

<form method="POST" enctype="multipart/form-data">

<div class="mb-3">
<label>Roll No:</label>
<input type="text" class="form-control" name="roll_no" placeholder="Enter Roll Number" required>
</div>

{% for q in questions %}
<div class="mb-4 p-3 border rounded">
<label><strong>Question {{ loop.index }}:</strong> {{ q.question }}</label>
<input type="hidden" name="question" value="{{ q.question }}">
<input type="hidden" name="max_marks" value="{{ q.max_marks }}">
<input type="hidden" name="model_answer" value="{{ q.model_answer }}">
<label class="form-label small text-muted">Upload Answer Sheet</label>
<input type="file" class="form-control" name="file_{{ loop.index0 }}" required>
</div>
{% endfor %}

<button type="submit" class="main-btn w-100">Evaluate</button>
</form>
</div>
</body>
</html>
